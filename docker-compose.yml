version: '3.8'

services:
  # Rent-a-Relic Market API
  market-api:
    image: python:3.11-slim
    container_name: rustchain-market-api
    working_dir: /app
    volumes:
      - ./app:/app
      - ./requirements.txt:/app/requirements.txt
    command: >
      bash -c "pip install -r requirements.txt &&
               python app.py"
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://rustchain:${POSTGRES_PASSWORD}@postgres:5432/rustchain_market
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rustchain-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16.4
    container_name: rustchain-market-db
    environment:
      - POSTGRES_USER=rustchain
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=rustchain_market
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustchain -d rustchain_market"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rustchain-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7.4-alpine
    container_name: rustchain-market-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rustchain-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25.4-alpine
    container_name: rustchain-market-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - market-api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rustchain-network
    restart: unless-stopped

networks:
  rustchain-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
